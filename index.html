<!DOCTYPE html>
<html lang="en">

    <!-- Custom Style Overrides for Index Page -->
    <style>
      /* Mobile navigation container */
      .mobile-nav-container {
        position: fixed;
        top: 0;
        right: 0;
        width: 100%;
        padding: 20px;
        z-index: 1000;
        display: flex;
        justify-content: flex-end;
        pointer-events: none; /* Allow clicks to pass through to elements below */
      }
      
      /* Override hamburger menu positioning for index page */
      .hamburger-menu {
        position: relative;
        top: unset;
        right: unset;
        display: none;
        z-index: 1000;
        pointer-events: auto; /* Make hamburger clickable */
        background-color: rgba(17, 17, 17, 0.5); /* Semi-transparent background */
        backdrop-filter: blur(5px); /* Blur effect */
        border-radius: 4px; /* Rounded corners */
        cursor: pointer; /* Ensure cursor shows this is clickable */
      }
      
      /* Show hamburger menu only on mobile */
      @media only screen and (max-width: 992px) {
        .hamburger-menu {
          display: block;
        }
        
        .vertical-navigation {
          display: none;
        }
      }
      
      /* Ensure sidebar is visible when active */
      .mobile-sidebar.active {
        right: 0 !important;
        visibility: visible !important;
        transform: translateX(0) !important;
      }

      .demo .large-header {
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>

  <!-- MAIN PART -->

  <body>

    <div class="mobile-nav-container">
      <!-- Hamburger Menu Button on right side with inline onclick handler -->
      <div class="hamburger-menu" onclick="toggleMobileNav(event)">
        <div class="hamburger-icon">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    
    <!-- Mobile Sidebar Navigation (hidden by default) -->
    <div class="mobile-sidebar">
      <div class="sidebar-header">
        <!-- Removing the sidebar-close div that's creating the gray cross -->

      <div class="sidebar-content">
        <a href="publications.html" class="sidebar-item">
          <span class="nav-number">01</span>
          <span class="nav-text">Publications</span>
        </a>
        <a href="experience.html" class="sidebar-item">
          <span class="nav-number">02</span>

        </a>
        <a href="projects.html" class="sidebar-item">

      </div>
      <div class="sidebar-footer">
      </div>
    </div>
    
    <!-- Sidebar Overlay -->

    <header class="title">

          <div class="main-title">
            <h1 class="main-title-header"><a href="about.html" class="name-link"><strong><span>Ananya</span> <span>Singhal</span></strong></a></h1>
            <!-- Add this to your small-title paragraph in the main-title div -->
            <p class="small-title">
              <strong>
                I build things<span class="project-pointer-container">,</span>

            <!-- Projects arrow group -->

                <a href="projects.html" class="project-bubble">

    <!-- Scripts -->

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const mainTitle = document.querySelector(".main-title");
        const header = document.querySelector(".large-header");
    
        let revealed = false;
    
        mainTitle.addEventListener("mouseenter", function () {
          if (!revealed) {
            header.classList.add("reveal");
            revealed = true;
          }
        });
      });
    </script>
    

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.5.1/gsap.min.js"
      integrity="sha512-IQLehpLoVS4fNzl7IfH8Iowfm5+RiMGtHykgZJl9AWMgqx0AmJ6cRWcB+GaGVtIsnC4voMfm8f2vwtY+6oPjpQ=="
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script src="navigation.js"></script>
    <script src="canvas-handler.js"></script>
    
    <!-- Index-specific mobile navigation fix -->
    <script>
      // Wait for DOM to be fully loaded
      document.addEventListener('DOMContentLoaded', function() {
        // Get the hamburger menu and related elements
        const hamburger = document.querySelector('.hamburger-menu');
        const hamburgerIcon = document.querySelector('.hamburger-icon');
        const mobileSidebar = document.querySelector('.mobile-sidebar');
        const sidebarOverlay = document.querySelector('.sidebar-overlay');
        const sidebarClose = document.querySelector('.sidebar-close');
        
        // Explicitly add click event to hamburger for index page
        if (hamburger) {
          hamburger.addEventListener('click', function() {
            console.log('Index page hamburger clicked');
            hamburgerIcon.classList.toggle('hamburger-active');
            mobileSidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
            
            if (mobileSidebar.classList.contains('active')) {
              document.body.style.overflow = 'hidden';
            } else {
              document.body.style.overflow = '';
            }
          });
        }
        
        // Explicitly add click event to close button
        if (sidebarClose) {
          sidebarClose.addEventListener('click', function() {
            console.log('Index page sidebar close clicked');
            hamburgerIcon.classList.remove('hamburger-active');
            mobileSidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
          });
        }
        
        // Explicitly add click event to overlay
        if (sidebarOverlay) {
          sidebarOverlay.addEventListener('click', function() {
            console.log('Index page overlay clicked');
            hamburgerIcon.classList.remove('hamburger-active');
            mobileSidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
          });
        }
        
        // Also handle click on sidebar items
        document.querySelectorAll('.sidebar-item').forEach(item => {
          item.addEventListener('click', function() {
            hamburgerIcon.classList.remove('hamburger-active');
            mobileSidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
          });
        });
      });
    </script>
  </body>
